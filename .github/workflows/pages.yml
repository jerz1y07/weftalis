name: Deploy Weftalis Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up supported Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install website dependencies safely
        working-directory: website
        run: npm ci --ignore-scripts

      - name: Sync website Registry
        working-directory: website
        run: npm run sync-registry

      - name: Check website Registry
        working-directory: website
        run: npm run check-registry

      - name: Confirm website Registry was committed
        run: git diff --exit-code -- website/generated/registry.json

      - name: Build static website for GitHub Pages
        working-directory: website
        env:
          WEFTALIS_BASE_PATH: /weftalis
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/out

  deploy:
    name: Deploy static website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

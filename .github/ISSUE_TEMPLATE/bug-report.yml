name: Bug report
description: Report a reproducible problem without sharing credentials or sensitive Workflow data.
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Remove every real Secret, Token, API key, Credential, private key, and private Workflow value from logs, screenshots, and examples.
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Workflow Package Specification
        - Validator
        - Registry Builder
        - Website
        - Contribution or CI documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest safe steps that reproduce the problem. Do not upload a Workflow containing credentials.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "For example: 24.18.0"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: "For example: macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Optional. Remove credentials, tokens, private paths, and sensitive Workflow data before pasting.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed all real Secrets, Tokens, API keys, Credentials, private keys, and sensitive Workflow data.
          required: true

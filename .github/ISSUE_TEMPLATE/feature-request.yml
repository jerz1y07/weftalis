name: Weftalis feature request
description: Propose a focused improvement to an existing Weftalis component.
title: "[Feature]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Describe the Weftalis problem without posting credentials, private Workflow data, or security-sensitive evidence.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult today, and who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds did you consider?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Workflow Package Specification
        - Validator or Adapter
        - Registry Builder
        - Website
        - Contribution or CI process
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Are you willing to contribute this change?
      options:
        - Yes
        - Maybe, with guidance
        - No
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This request contains no real Credential, Token, API key, Secret, or private Workflow data.
          required: true

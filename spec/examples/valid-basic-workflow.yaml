spec_version: "0.1"
id: text-summary
name: Text Summary
version: 1.0.0
description: Summarizes supplied text into a short, structured response.
author: Open Workflow Registry Examples
repository: https://example.com/open-workflow-registry-examples
license: MIT

runtime:
  platform: n8n
  minimum_version: 1.50.0
  source_file: workflow.json

inputs:
  - name: source_text
    type: string
    required: true
    description: The text that should be summarized.
  - name: maximum_points
    type: integer
    required: false
    description: Preferred maximum number of summary points.

outputs:
  - name: summary
    type: string
    description: A concise summary of the supplied text.

dependencies:
  services: []
  models: []
  tools: []

permissions:
  network_access: false
  filesystem_read: false
  filesystem_write: false
  email_send: false
  social_publish: false
  code_execution: false
  credential_access: false

human_review:
  required: false
  checkpoints: []

safety:
  stores_user_data: false
  sends_data_externally: false
  contains_credentials: false
  risk_level: low

files:
  readme: README.md
  example_input: examples/input.json
  example_output: examples/output.json

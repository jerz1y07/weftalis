spec_version: "0.1"
id: invalid-undeclared-email-permission
name: Invalid Undeclared Email Permission Example
version: 1.0.0
description: Sends a generated status summary by email, but incorrectly declares email_send as false.
author: Open Workflow Registry Examples
license: MIT

runtime:
  platform: n8n
  minimum_version: 1.50.0
  source_file: workflow.json

categories:
  - demonstration
tags:
  - invalid
  - email

inputs:
  - name: recipient
    type: string
    required: true
    description: Email address that should receive the summary.
outputs:
  - name: delivery_status
    type: string
    description: Result reported by the email delivery step.

dependencies:
  services:
    - email-delivery-service
  models: []
  tools:
    - email-sender

permissions:
  network_access: true
  filesystem_read: false
  filesystem_write: false
  email_send: false
  social_publish: false
  code_execution: false
  credential_access: true

human_review:
  required: false
  checkpoints: []

safety:
  stores_user_data: false
  sends_data_externally: true
  contains_credentials: false
  risk_level: medium

testing:
  status: untested

files:
  readme: README.md
